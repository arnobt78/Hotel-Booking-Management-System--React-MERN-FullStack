# Agile V policy-as-code — hotel-booking-1
policy_version: "1.0.0"
fail_mode: closed
effective_from: "2026-07-23T00:00:00Z"
rules:
  - id: R001
    description: "Destructive git (force push, hard reset) requires explicit user request."
    match:
      tool_pattern: "(?i)(git push --force|git reset --hard)"
    action: deny
    risk_weight: 5
    fail_closed: true
  - id: R002
    description: "Commit only when user explicitly asks."
    match:
      tool_pattern: "(?i)(git commit)"
    action: require_approval_ref
    risk_weight: 3
    fail_closed: true
  - id: R003
    description: "Deny writing secrets to tracked files."
    match:
      paths:
        - "**/.env"
        - "**/.env.*"
        - "**/secrets/**"
    action: deny
    risk_weight: 5
    fail_closed: true
  - id: R004
    description: "New code must reference REQ-XXXX in .agile-v or artifact comment."
    match:
      tool_pattern: "(?i)(write|edit)"
    action: require_checkpoint
    risk_weight: 2
    fail_closed: false
  - id: R005
    description: "Do not deploy production without Human Gate 2 approval."
    match:
      tool_pattern: "(?i)(vercel deploy --prod|coolify.*deploy)"
    action: require_approval_ref
    risk_weight: 4
    fail_closed: true
